name: Split Packages

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  packages_split:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'foundation'
            split_repository: 'foundation-contracts'
          - local_path: 'core'
            split_repository: 'core-contracts'
          - local_path: 'frontend'
            split_repository: 'frontend-contracts'
          - local_path: 'wp-core'
            split_repository: 'wp-core-contracts'
          - local_path: 'wp-filesystem'
            split_repository: 'wp-filesystem-contracts'
          - local_path: 'wp-hooks'
            split_repository: 'wp-hooks-contracts'
          - local_path: 'wp-http'
            split_repository: 'wp-http-contracts'
          - local_path: 'wp-i18n'
            split_repository: 'wp-i18n-contracts'
          - local_path: 'wp-media'
            split_repository: 'wp-media-contracts'
          - local_path: 'wp-meta'
            split_repository: 'wp-meta-contracts'
          - local_path: 'wp-options'
            split_repository: 'wp-options-contracts'
          - local_path: 'wp-posts'
            split_repository: 'wp-posts-contracts'
          - local_path: 'wp-query'
            split_repository: 'wp-query-contracts'
          - local_path: 'wp-terms'
            split_repository: 'wp-terms-contracts'
          - local_path: 'wp-transients'
            split_repository: 'wp-transients-contracts'
          - local_path: 'wp-users'
            split_repository: 'wp-users-contracts'
          - local_path: 'wp-assets'
            split_repository: 'wp-assets-contracts'

    steps:
      - uses: actions/checkout@v6

      - name: Setup GitHub App
        id: setup-app
        uses: ./.github/actions/setup-github-app
        with:
          app_id: ${{ vars.RELEASER_APP_ID }}
          private_key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }},foundation-contracts,core-contracts,frontend-contracts,wp-core-contracts,wp-filesystem-contracts,wp-hooks-contracts,wp-http-contracts,wp-i18n-contracts,wp-media-contracts,wp-meta-contracts,wp-options-contracts,wp-posts-contracts,wp-query-contracts,wp-terms-contracts,wp-transients-contracts,wp-users-contracts,wp-assets-contracts


      - name: Determine tag (if exists)
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=" >> $GITHUB_OUTPUT
          fi

      - name: Split package
        uses: danharrin/monorepo-split-github-action@v2.4.4
        with:
          tag: ${{ steps.info.outputs.type == 'tag' && steps.info.outputs.ref || '' }}
          branch: ${{ steps.info.outputs.type == 'branch' && steps.info.outputs.ref || '' }}
          package_directory: packages/${{ matrix.package.local_path }}
          repository_organization: ${{ github.repository_owner }}
          repository_name: ${{ matrix.package.split_repository }}
          user_name: ${{ steps.setup-app.outputs.bot_name }}
          user_email: ${{ steps.setup-app.outputs.bot_email }}
        env:
          GITHUB_TOKEN: x-access-token:${{ steps.setup-app.outputs.token }}
